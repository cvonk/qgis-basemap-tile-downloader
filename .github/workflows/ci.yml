name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest ruff flake8

      - name: Lint (ruff)
        run: ruff check .

      - name: Lint (flake8)
        # Uses .flake8 (max-line-length=100; the compact-style pycodestyle codes
        # are ignored there) — this is the QGIS Plugin Repository's quality check.
        run: flake8 basemap_tile_downloader tests

      - name: Byte-compile the plugin
        # Catches syntax errors across every module without needing QGIS
        # (compileall does not import, so the qgis imports are never executed).
        run: python -m compileall -q basemap_tile_downloader

      - name: Run unit tests
        run: pytest -q

      - name: Validate metadata.txt
        run: python .github/scripts/validate_metadata.py
