name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest ruff flake8 bandit detect-secrets

      - name: Lint (ruff)
        run: ruff check .

      - name: Lint (flake8)
        # Uses the repo-root .flake8 (max-line-length=100; compact-style codes and
        # E501 ignored — ruff owns line length). Not shipped in the package to
        # avoid a "suspicious hidden file" flag on the QGIS Plugin Repository.
        run: flake8 basemap_tile_downloader tests

      - name: Security analysis (bandit)
        # Full scan (all severities), matching the QGIS Plugin Repository check.
        # The intentional low-severity notes (subprocess to read the git hash,
        # best-effort try/except/pass, hardened-XML imports) carry scoped
        # `# nosec BXXX` markers, so this stays green while catching new findings.
        run: bandit -r basemap_tile_downloader -q

      - name: Secrets detection (detect-secrets)
        run: |
          detect-secrets scan | python -c "import json,sys; r=json.load(sys.stdin)['results']; print('No secrets detected') if not r else sys.exit('Potential secrets found in: ' + ', '.join(r))"

      - name: Byte-compile the plugin
        # Catches syntax errors across every module without needing QGIS
        # (compileall does not import, so the qgis imports are never executed).
        run: python -m compileall -q basemap_tile_downloader

      - name: Run unit tests
        run: pytest -q

      - name: Validate metadata.txt
        run: python .github/scripts/validate_metadata.py

  # Keeps CLAUDE.md honest: adding or removing a source backend must update it in
  # the same change (see the script for the why and the deliberately narrow
  # scope). Its own job so it can check out full history without slowing the main
  # test job's shallow clone.
  docs-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0        # both BASE and HEAD must be present for the diff

      - name: Require a CLAUDE.md update when a source backend is added/removed
        env:
          # PR: compare the PR's base against its head (github.sha is the merge
          # commit, not the head). Push: compare against the pushed-over commit.
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: python .github/scripts/require_claude_md_update.py
