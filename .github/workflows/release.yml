name: Release

on:
  push:
    tags: [ "v*" ]

permissions:
  contents: write        # needed to create the release and upload the asset

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build plugin zip
        # git archive uses the committed tree, so no __pycache__/.pyc sneaks in.
        # The zip contains a top-level basemap_tile_downloader/ folder ready to
        # drop into a QGIS plugins directory.
        run: git archive --format=zip -o "basemap_tile_downloader-${{ github.ref_name }}.zip" HEAD basemap_tile_downloader

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: basemap_tile_downloader-*.zip
          generate_release_notes: true
